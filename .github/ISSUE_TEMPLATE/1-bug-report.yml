name: 🐛 Bug Report
description: Report a bug with Vermeil launcher
labels: [bug]
body:
  - type: checkboxes
    attributes:
      label: Before submitting
      options:
        - label: I checked the [existing issues](https://github.com/Vermeil-Launcher/Vermeil-Launcher/issues?q=is%3Aissue) for duplicates
          required: true
        - label: I am using the latest version of Vermeil
          required: true
  - type: input
    id: version
    attributes:
      label: Vermeil version
      description: Find this in Settings at the bottom of the page
      placeholder: "0.1.0"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "Windows 11 23H2"
    validations:
      required: true
  - type: textarea
    attributes:
      label: Describe the bug
      description: A clear description of what the bug is. Include screenshots if applicable.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Steps to reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true
  - type: textarea
    attributes:
      label: Expected behavior
      description: What you expected to happen instead.
    validations:
      required: false
  - type: textarea
    attributes:
      label: Logs / crash report
      description: Paste any relevant logs or crash reports. You can find logs in Settings → Open Logs Folder.
      render: text
    validations:
      required: false
  - type: textarea
    attributes:
      label: Additional context
      description: Any other context — Minecraft version, mod loader, Java version, etc.
    validations:
      required: false
