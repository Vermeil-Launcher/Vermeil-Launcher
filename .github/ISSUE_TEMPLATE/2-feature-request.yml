name: 💡 Feature Request
description: Suggest a new feature or improvement
labels: [enhancement]
body:
  - type: checkboxes
    attributes:
      label: Before submitting
      options:
        - label: I checked the [existing issues](https://github.com/davekb1976-beep/Vermeil-Launcher/issues?q=is%3Aissue) for duplicate requests
          required: true
  - type: textarea
    attributes:
      label: Problem
      description: What problem does this solve? What frustration does it address?
      placeholder: "I'm always frustrated when..."
    validations:
      required: true
  - type: textarea
    attributes:
      label: Proposed solution
      description: Describe what you'd like to happen.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Alternatives considered
      description: Any other approaches you've thought about.
    validations:
      required: false
  - type: textarea
    attributes:
      label: Additional context
      description: Screenshots, mockups, or links to similar features in other launchers.
    validations:
      required: false
