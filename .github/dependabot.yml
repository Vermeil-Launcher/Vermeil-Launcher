# Dependabot configuration.
#
# Security alerts are always on (those are configured in repo settings, not
# this file) and will appear in the Security tab if a dep has a known CVE.
#
# Version-update PRs are intentionally NOT configured here. For a solo
# project, weekly version bumps create noise without value — the patch
# bumps don't fix anything user-visible and the major bumps need
# testing. Refresh deps manually before significant feature work instead.
#
# To enable version updates again later, uncomment the `updates:` block
# below. Reference: https://docs.github.com/en/code-security/dependabot

version: 2
updates: []

