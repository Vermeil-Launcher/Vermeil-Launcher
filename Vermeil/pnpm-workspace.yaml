packages:
  - .

allowBuilds:
  esbuild: true

# Pin esbuild >= 0.28.1 to address GHSA-gv7w-rqvm-qjhr (missing SHA-256
# integrity check in the Deno install path). Vite 6 still pulls 0.25.x
# transitively; this override forces the patched version.
#
# Pin @babel/core >= 7.29.6 to address GHSA-4x5r-pxfx-6jf8 (arbitrary file
# read via sourceMappingURL comment). Pulled in transitively by
# vite-plugin-solid → babel-preset-solid; the override forces the patched
# version.
overrides:
  esbuild: ">=0.28.1"
  "@babel/core": ">=7.29.6"
